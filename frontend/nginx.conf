server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: qualquer rota desconhecida cai no index.html (React Router resolve no cliente).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Assets com hash no nome → cache longo.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
