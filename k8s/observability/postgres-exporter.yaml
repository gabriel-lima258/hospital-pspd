# postgres-exporter — lê pg_stat_* do Postgres e expõe como métricas Prometheus (§7.1: prova, com
# número do LADO DO BANCO, que o Postgres 1-réplica é o gargalo). Atende o §5.1 ("número de consultas
# ao banco") e o §3(c) ("impacto no banco de dados"). Aplicado por `make deploy` (k8s/observability).
#
# Credenciais em claro no DATA_SOURCE_NAME: coerente com k8s/base/postgres.yaml (app/app já em claro).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  labels: { app: postgres-exporter }
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres-exporter }
  template:
    metadata:
      labels: { app: postgres-exporter }
    spec:
      containers:
        - name: exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
          env:
            - name: DATA_SOURCE_NAME
              value: "postgresql://app:app@db:5432/hospital?sslmode=disable"
          ports:
            - { containerPort: 9187, name: metrics }
          readinessProbe:
            httpGet: { path: /metrics, port: 9187 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  labels: { app: postgres-exporter }
spec:
  type: ClusterIP
  selector: { app: postgres-exporter }
  ports:
    - { name: metrics, port: 9187, targetPort: 9187 }
---
# ServiceMonitor dedicado: o exporter serve em /metrics (o hospital-services usa /actuator/prometheus).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres-exporter
  namespace: default
  labels:
    release: kps            # casa com o serviceMonitorSelector do Prometheus do kps
spec:
  namespaceSelector:
    matchNames: [default]
  selector:
    matchLabels:
      app: postgres-exporter
  endpoints:
    - port: metrics
      path: /metrics
      interval: 5s
