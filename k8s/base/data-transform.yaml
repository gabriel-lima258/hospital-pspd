# Data Transform — gRPC server (9090) + actuator/métrica (8080). Stateless (sem banco).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-transform
  labels: { app: data-transform }
spec:
  # `replicas` omitido: quem manda é `kubectl scale` (fase c) ou o HPA (fase d). Ver api-gateway.yaml.
  selector:
    matchLabels: { app: data-transform }
  template:
    metadata:
      labels: { app: data-transform }
    spec:
      containers:
        - name: data-transform
          image: hospital/data-transform:dev
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8080, name: http }
            - { containerPort: 9090, name: grpc }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 40
            periodSeconds: 10
          resources:
            requests: { cpu: "250m", memory: "512Mi" }   # requests.cpu obrigatório p/ o HPA (D5)
            limits:   { cpu: "1",    memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: data-transform
  labels:
    app: data-transform
    monitored: "true"
spec:
  type: ClusterIP
  selector: { app: data-transform }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
    - { name: grpc, port: 9090, targetPort: 9090 }
