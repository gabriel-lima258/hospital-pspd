# Patient Data — gRPC server (9090) + actuator/métrica (8080). Lê o Postgres (db:5432, via application.yml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-data
  labels: { app: patient-data }
spec:
  # `replicas` omitido: quem manda é `kubectl scale` (fase c) ou o HPA (fase d). Ver api-gateway.yaml.
  selector:
    matchLabels: { app: patient-data }
  template:
    metadata:
      labels: { app: patient-data }
    spec:
      # Espalha as réplicas pelos 3 workers (§3(c) do enunciado). Ver api-gateway.yaml.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: { app: patient-data }
      containers:
        - name: patient-data
          image: hospital/patient-data:dev
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8080, name: http }
            - { containerPort: 9090, name: grpc }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            # SÓ o liveness-state da JVM (não checa DB). Sob carga o /actuator/health completo fica lento
            # (Postgres saturado, §7.1) e o kubelet mataria um pod só OCUPADO → restart envenena o
            # round_robin. Timeout/failureThreshold folgados: ocupado ≠ morto.
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests: { cpu: "250m", memory: "512Mi" }   # requests.cpu obrigatório p/ o HPA (D5)
            limits:   { cpu: "1",    memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: patient-data
  labels:
    app: patient-data
    monitored: "true"
spec:
  type: ClusterIP
  selector: { app: patient-data }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
    - { name: grpc, port: 9090, targetPort: 9090 }
