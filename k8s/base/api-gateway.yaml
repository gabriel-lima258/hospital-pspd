# API Gateway вЂ” REST (9000). Гљnico serviГ§o acessado de fora (port-forward). Valida JWT e orquestra gRPC.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels: { app: api-gateway }
spec:
  # `replicas` omitido de propГіsito: quem manda na contagem Г© `kubectl scale` (fase c) ou o HPA
  # (fase d). Declarado aqui, todo `kubectl apply` resetaria a escala no meio de uma mediГ§ГЈo.
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
    spec:
      # Espalha as rГ©plicas pelos 3 workers вЂ” o enunciado В§3(c) pede "a distribuiГ§ГЈo dos pods do
      # K8S". O default do scheduler Г© maxSkew:3, que permitiria 3 rГ©plicas caГ­rem 2/1/0.
      # `ScheduleAnyway` (soft) e nГЈo `DoNotSchedule`: com o HPA indo a 10 rГ©plicas, um constraint
      # duro deixaria pods em Pending ao lotar o nГі вЂ” e Pending sob carga contamina a fase (d).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: { app: api-gateway }
      containers:
        - name: api-gateway
          image: hospital/api-gateway:dev
          imagePullPolicy: IfNotPresent
          env:
            # TTL do cache de DNS da JVM. Sem isso, o gateway leva ~30s para enxergar um pod
            # novo criado pelo HPA no registro A do Service headless.
            # ARMADILHA: `networkaddress.cache.ttl` Г© security property (java.security) e NГѓO Г©
            # lida via -D. A equivalente que funciona via -D Г© `sun.net.inetaddr.ttl`.
            # A defasagem que sobra (EndpointSlice в†’ registro A в†’ re-resoluГ§ГЈo do grpc-java) Г©
            # justamente o que a descoberta В§7.2 mede вЂ” reduzir, nГЈo zerar.
            - name: JAVA_TOOL_OPTIONS
              value: "-Dsun.net.inetaddr.ttl=5 -Dsun.net.inetaddr.negative.ttl=0"
            # Split-horizon do Keycloak: aceita o iss que o browser gera (localhost:8080), mas busca as
            # chaves de assinatura no Service INTERNO (keycloak:8080), que o pod alcanГ§a. Assim o login
            # OIDC no browser funciona sem editar /etc/hosts. Ver SecurityConfig + docs/RUNBOOK-frontend.md.
            - { name: JWT_ISSUER_URI,  value: "http://localhost:8080/realms/hospital" }
            - { name: JWT_JWK_SET_URI, value: "http://keycloak:8080/realms/hospital/protocol/openid-connect/certs" }
          # As envs GRPC_*_ADDRESS / GRPC_LB_POLICY NГѓO sГЈo declaradas aqui de propГіsito: assim
          # `kubectl apply` nГЈo as gerencia e o valor posto por `make grpc-lb-off` sobrevive.
          ports:
            - { containerPort: 9000, name: http }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 9000 }
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet: { path: /actuator/health, port: 9000 }
            initialDelaySeconds: 40
            periodSeconds: 10
          resources:
            requests: { cpu: "250m", memory: "512Mi" }   # requests.cpu obrigatГіrio p/ o HPA (D5)
            limits:   { cpu: "1",    memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    app: api-gateway
    monitored: "true"            # selecionado pelo ServiceMonitor
spec:
  type: ClusterIP
  selector: { app: api-gateway }
  ports:
    - { name: http, port: 9000, targetPort: 9000 }   # porta de mГ©trica nomeada "http"
